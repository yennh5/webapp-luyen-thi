<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webapp Luyện Thi Online - Cloud Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CẤU HÌNH KẾT NỐI DATABASE ĐÁM MÂY (FIREBASE) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDNi9xElgUcmw0310TP5rmCw2HQkgfP4EA",
            authDomain: "he-thong-thi-online-a12e0.firebaseapp.com",
            projectId: "he-thong-thi-online-a12e0",
            storageBucket: "he-thong-thi-online-a12e0.firebasestorage.app",
            messagingSenderId: "857196673386",
            appId: "1:857196673386:web:b3cc19c5c9701de7128d13",
            measurementId: "G-THZTDJ3PNV"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const generateId = () => Math.random().toString(36).substring(2, 15);

        // 1. Giao diện làm bài thi
        const QuizRunner = ({ exam, onComplete }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isChecked, setIsChecked] = useState(false);
            const [history, setHistory] = useState([]);

            const question = exam.questions[currentIndex];

            const handleCheck = () => {
                setIsChecked(true);
            };

            const handleNext = () => {
                const isCorrect = selectedAnswer === question.correctAnswer;
                const newHistory = [...history, { question, selectedAnswer, isCorrect }];

                if (currentIndex < exam.questions.length - 1) {
                    setHistory(newHistory);
                    setCurrentIndex(currentIndex + 1);
                    setSelectedAnswer(null);
                    setIsChecked(false);
                } else {
                    onComplete(newHistory, exam);
                }
            };

            return (
                <div className="max-w-3xl mx-auto bg-white p-6 rounded-lg shadow mt-6">
                    <h2 className="text-xl font-bold mb-4 border-b pb-2">{exam.title} - Câu {currentIndex + 1}/{exam.questions.length}</h2>
                    <p className="text-lg font-medium mb-6">{question.content}</p>

                    <div className="space-y-3 mb-6">
                        {question.options.map((opt, idx) => {
                            let btnClass = "w-full text-left p-4 rounded-lg border transition-all ";
                            if (isChecked) {
                                if (idx === question.correctAnswer) btnClass += "bg-green-100 border-green-500 font-bold ";
                                else if (idx === selectedAnswer) btnClass += "bg-red-100 border-red-500 ";
                                else btnClass += "bg-gray-50 border-gray-200 opacity-60 ";
                            } else {
                                btnClass += selectedAnswer === idx ? "bg-blue-50 border-blue-500" : "bg-white border-gray-300 hover:bg-gray-50";
                            }

                            return (
                                <button
                                    key={idx}
                                    disabled={isChecked}
                                    onClick={() => setSelectedAnswer(idx)}
                                    className={btnClass}
                                >
                                    {String.fromCharCode(65 + idx)}. {opt}
                                </button>
                            );
                        })}
                    </div>

                    {isChecked && (
                        <div className="bg-yellow-50 border border-yellow-200 p-4 rounded-lg mb-6">
                            <h4 className="font-bold text-yellow-800 mb-1">Giải thích chi tiết:</h4>
                            <p className="text-yellow-900">{question.explanation}</p>
                        </div>
                    )}

                    <div className="flex justify-end">
                        {!isChecked ? (
                            <button
                                onClick={handleCheck}
                                disabled={selectedAnswer === null}
                                className="bg-blue-600 text-white px-6 py-2 rounded font-medium disabled:opacity-50"
                            >
                                Kiểm tra
                            </button>
                        ) : (
                            <button
                                onClick={handleNext}
                                className="bg-indigo-600 text-white px-6 py-2 rounded font-medium"
                            >
                                {currentIndex < exam.questions.length - 1 ? "Câu tiếp theo" : "Hoàn thành"}
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        // 2. Màn hình kết quả
        const ResultReview = ({ history, exam, onGoHome, onRetry }) => {
            const correctCount = history.filter(h => h.isCorrect).length;

            return (
                <div className="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow mt-6">
                    <div className="text-center mb-8">
                        <h2 className="text-3xl font-bold text-gray-800 mb-2">Kết quả bài thi</h2>
                        <p className="text-xl text-blue-600 font-semibold">Điểm số: {correctCount}/{exam.questions.length} câu đúng</p>
                    </div>

                    <div className="space-y-6">
                        {history.map((item, idx) => (
                            <div key={idx} className="border p-4 rounded-lg">
                                <p className="font-bold mb-3">Câu {idx + 1}: {item.question.content}</p>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
                                    {item.question.options.map((opt, oIdx) => {
                                        let textClass = "p-2 rounded ";
                                        if (oIdx === item.question.correctAnswer) textClass += "bg-green-100 text-green-800 font-bold";
                                        else if (oIdx === item.selectedAnswer) textClass += "bg-red-100 text-red-800";
                                        else textClass += "bg-gray-50 text-gray-500";

                                        return <div key={oIdx} className={textClass}>{String.fromCharCode(65 + oIdx)}. {opt}</div>;
                                    })}
                                </div>
                                <div className="bg-blue-50 p-3 rounded">
                                    <span className="font-bold">Giải thích:</span> {item.question.explanation}
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="mt-8 flex gap-4 justify-center">
                        <button onClick={onGoHome} className="px-6 py-2 border border-gray-300 rounded font-medium hover:bg-gray-50">Quay lại danh sách</button>
                        <button onClick={onRetry} className="px-6 py-2 bg-blue-600 text-white rounded font-medium hover:bg-blue-700">Làm lại đề này</button>
                    </div>
                </div>
            );
        };

        // 3. Trang chủ Guest
        const GuestPanel = ({ exams, onStartExam, loading }) => {
            if (loading) return <p className="text-center mt-10 text-gray-500 animate-pulse">Đang đồng bộ dữ liệu đề thi từ đám mây...</p>;
            if (exams.length === 0) return <p className="text-center mt-10 text-gray-500">Hiện tại chưa có đề thi nào trên hệ thống đám mây.</p>;

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-6">
                    {exams.map(exam => (
                        <div key={exam.id} className="bg-white p-5 rounded-lg shadow border border-gray-100 flex flex-col justify-between hover:shadow-md transition">
                            <div>
                                <h3 className="text-lg font-bold mb-2 text-gray-800">{exam.title}</h3>
                                <p className="text-gray-500 text-sm mb-4">Số lượng: {exam.questions.length} câu hỏi</p>
                            </div>
                            <button
                                onClick={() => onStartExam(exam)}
                                className="w-full bg-indigo-600 text-white py-2 rounded font-medium hover:bg-indigo-700 transition"
                            >
                                Bắt đầu làm bài
                            </button>
                        </div>
                    ))}
                </div>
            );
        };

        // 4. Admin panel
        const AdminPanel = ({ exams, loading }) => {
            const handleImportCSV = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;

                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    transformHeader: (h) => h.replace(/^\uFEFF/, "").trim(),
                    complete: ({ data, errors }) => {
                        if (errors?.length) {
                            alert("CSV parse lỗi: " + errors[0].message);
                            e.target.value = "";
                            return;
                        }

                        const questions = data.map((row) => {
                            const content = (row.Question || "").trim();
                            const options = [
                                (row.Option1 || "").trim(),
                                (row.Option2 || "").trim(),
                                (row.Option3 || "").trim(),
                                (row.Option4 || "").trim()
                            ];
                            const correctAnswer = Number.parseInt((row["CorrectIndex(0-3)"] || "").trim(), 10);
                            const explanation = (row.Explanation || "").trim();

                            if (!content || options.some(o => !o) || !Number.isInteger(correctAnswer) || correctAnswer < 0 || correctAnswer > 3) {
                                return null;
                            }

                            return {
                                id: generateId(),
                                content,
                                options,
                                correctAnswer,
                                explanation
                            };
                        }).filter(Boolean);

                        if (questions.length === 0) {
                            alert("Không có câu hỏi hợp lệ. Kiểm tra đúng header: Question, Option1, Option2, Option3, Option4, CorrectIndex(0-3), Explanation");
                            e.target.value = "";
                            return;
                        }

                        const newExam = {
                            title: `Đề thi CSV - Ngày ${new Date().toLocaleDateString("vi-VN")}`,
                            createdAt: new Date().toISOString(),
                            questions
                        };

                        db.ref("exams").push(newExam)
                            .then(() => alert(`Import thành công ${questions.length} câu hỏi lên đám mây!`))
                            .catch(err => alert("Lỗi tải dữ liệu lên đám mây: " + err.message))
                            .finally(() => {
                                e.target.value = "";
                            });
                    },
                    error: (err) => {
                        alert("Không thể đọc file CSV: " + err.message);
                        e.target.value = "";
                    }
                });
            };

            const downloadSampleCSV = () => {
                const rows = [
                    ["Question", "Option1", "Option2", "Option3", "Option4", "CorrectIndex(0-3)", "Explanation"],
                    ["Thủ đô của Việt Nam là gì?", "Hồ Chí Minh", "Hà Nội", "Đà Nẵng", "Cần Thơ", "1", "Hà Nội là thủ đô của Việt Nam."],
                    ["2 + 2 bằng bao nhiêu?", "3", "4", "5", "6", "1", "2 + 2 = 4."]
                ];

                const csv = rows
                    .map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(","))
                    .join("\n");

                const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.setAttribute("download", "mau_de_thi.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);
            };

            const handleDelete = (id) => {
                if (confirm("Bạn có chắc chắn muốn xóa đề thi này vĩnh viễn trên hệ thống đám mây không?")) {
                    db.ref(`exams/${id}`).remove()
                        .then(() => alert("Đã xóa đề thi khỏi hệ thống đám mây."))
                        .catch(err => alert("Lỗi xóa dữ liệu: " + err.message));
                }
            };

            return (
                <div className="mt-6 bg-white p-6 rounded-lg shadow">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <h2 className="text-xl font-bold text-gray-700">Bảng điều khiển Admin (Mạng Đám Mây)</h2>
                        <div className="flex gap-2">
                            <button onClick={downloadSampleCSV} className="text-sm px-4 py-2 border rounded hover:bg-gray-50 font-medium">Tải CSV mẫu</button>
                            <label className="cursor-pointer bg-green-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-green-700 transition">
                                Import CSV
                                <input type="file" accept=".csv" className="hidden" onChange={handleImportCSV} />
                            </label>
                        </div>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-gray-100">
                                    <th className="p-3 border-b text-gray-600 font-bold">Tên đề thi</th>
                                    <th className="p-3 border-b text-gray-600 font-bold">Số lượng câu</th>
                                    <th className="p-3 border-b text-gray-600 font-bold">Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                {loading ? (
                                    <tr><td colSpan="3" className="p-4 text-center text-gray-400">Đang đồng bộ dữ liệu...</td></tr>
                                ) : exams.length === 0 ? (
                                    <tr><td colSpan="3" className="p-4 text-center text-gray-400">Chưa có đề thi nào trên Cloud Database</td></tr>
                                ) : exams.map(exam => (
                                    <tr key={exam.id} className="hover:bg-gray-50 transition">
                                        <td className="p-3 border-b font-medium text-gray-800">{exam.title}</td>
                                        <td className="p-3 border-b text-gray-600">{exam.questions.length}</td>
                                        <td className="p-3 border-b">
                                            <button onClick={() => handleDelete(exam.id)} className="text-red-500 hover:text-red-700 font-medium">Xóa vĩnh viễn</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // App
        const App = () => {
            const [role, setRole] = useState("GUEST");
            const [exams, setExams] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentView, setCurrentView] = useState("HOME");
            const [activeExam, setActiveExam] = useState(null);
            const [quizHistory, setQuizHistory] = useState([]);

            useEffect(() => {
                const examsRef = db.ref("exams");
                examsRef.on("value", (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const examList = Object.keys(data).map(key => ({
                            id: key,
                            ...data[key]
                        }));
                        setExams(examList);
                    } else {
                        setExams([]);
                    }
                    setLoading(false);
                }, (error) => {
                    console.error("Lỗi kết nối Firebase:", error);
                    setLoading(false);
                });

                return () => examsRef.off();
            }, []);

            const startExam = (exam) => {
                setActiveExam(exam);
                setCurrentView("QUIZ");
            };

            const finishExam = (history) => {
                setQuizHistory(history);
                setCurrentView("RESULT");
            };

            return (
                <div className="min-h-screen flex flex-col bg-gray-50">
                    <header className="bg-white shadow-sm border-b p-4">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <h1 onClick={() => setCurrentView("HOME")} className="text-xl font-bold text-indigo-700 cursor-pointer select-none">Hệ Thống Thi Online Cloud</h1>
                            <button
                                onClick={() => { setRole(role === "ADMIN" ? "GUEST" : "ADMIN"); setCurrentView("HOME"); }}
                                className="bg-gray-800 text-white px-4 py-1.5 rounded text-sm font-medium hover:bg-gray-900 transition"
                            >
                                Góc nhìn: {role === "ADMIN" ? "Giao diện Admin" : "Giao diện Thí sinh"}
                            </button>
                        </div>
                    </header>

                    <main className="flex-grow p-4 max-w-6xl mx-auto w-full">
                        {currentView === "HOME" && role === "ADMIN" && <AdminPanel exams={exams} loading={loading} />}
                        {currentView === "HOME" && role === "GUEST" && <GuestPanel exams={exams} onStartExam={startExam} loading={loading} />}
                        {currentView === "QUIZ" && <QuizRunner exam={activeExam} onComplete={finishExam} />}
                        {currentView === "RESULT" && <ResultReview history={quizHistory} exam={activeExam} onGoHome={() => setCurrentView("HOME")} onRetry={() => startExam(activeExam)} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
